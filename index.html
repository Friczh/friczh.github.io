<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <script type="importmap">
        {
            "imports": {
                "@material/web/": "https://esm.run/@material/web/"
            }
        }
    </script>
    <script type="module">
        import '@material/web/all.js';
    </script>

    <style>
        /* === MD3 Design Tokens === */
        :root {
            /* Emerald (Light) Theme */
            --md-sys-color-primary: #006C4A;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-secondary-container: #89F8C7;
            --md-sys-color-on-secondary-container: #002114;
            --md-sys-color-surface: #FBFDF9;
            --md-sys-color-on-surface: #191C1A;
            --md-sys-color-surface-container: #F0F3EF;
            --md-sys-color-outline: #707973;

            font-family: 'Roboto', sans-serif;
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        :root.dark {
            /* Light Blue (Dark) Theme */
            --md-sys-color-primary: #82CFFF;
            --md-sys-color-on-primary: #00344B;
            --md-sys-color-secondary-container: #004C6B;
            --md-sys-color-on-secondary-container: #C9E6FF;
            --md-sys-color-surface: #191C1E;
            --md-sys-color-on-surface: #E2E2E5;
            --md-sys-color-surface-container: #1E2022;
            --md-sys-color-outline: #8C9194;
        }

        /* === Layout Styles === */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Topbar */
        header {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            background-color: var(--md-sys-color-surface-container);
            border-bottom: 1px solid var(--md-sys-color-outline);
            gap: 12px;
            z-index: 10;
        }

        .spacer { flex-grow: 1; }

        /* Discord Status Chip */
        .status-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 16px;
            background-color: var(--md-sys-color-surface);
            border: 1px solid var(--md-sys-color-outline);
            font-size: 14px;
            font-weight: 500;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transition: background-color 0.3s ease;
        }
        .status-dot.online { background-color: #23a559; }
        .status-dot.idle { background-color: #f0b232; }
        .status-dot.dnd { background-color: #f23f43; }
        .status-dot.offline { background-color: #80848e; }

        /* Main Content & Drawer */
        .layout-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .drawer {
            background-color: var(--md-sys-color-surface-container);
            width: 250px;
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .drawer.closed {
            width: 0;
            opacity: 0;
        }

        main {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        /* Responsive: Expand Down on Mobile, Side on Desktop */
        @media (max-width: 768px) {
            .layout-body {
                flex-direction: column;
            }
            .drawer {
                width: 100%;
                max-height: 500px; /* Arbitrary large max-height for animation */
            }
            .drawer.closed {
                width: 100%;
                max-height: 0;
                padding: 0;
            }
            #top-tabs {
                display: none; /* Hide main tab on mobile to save space, relies on menu */
            }
        }
    </style>
</head>
<body>

    <header>
        <md-icon-button id="menu-btn">
            <md-icon>menu</md-icon>
        </md-icon-button>
        
        <md-tabs id="top-tabs">
            <md-primary-tab>Project</md-primary-tab>
        </md-tabs>

        <div class="spacer"></div>

        <div class="status-chip">
            <div id="status-dot" class="status-dot offline"></div>
            <span id="status-text">Connecting...</span>
        </div>

        <md-icon-button id="theme-btn">
            <md-icon id="theme-icon">dark_mode</md-icon>
        </md-icon-button>
    </header>

    <div class="layout-body">
        <nav id="drawer" class="drawer closed">
            <md-list>
                <md-list-item type="button">
                    <div slot="headline">Project</div>
                    <md-icon slot="start">folder</md-icon>
                </md-list-item>
                <md-list-item type="button">
                    <div slot="headline">About</div>
                    <md-icon slot="start">person</md-icon>
                </md-list-item>
                <md-list-item type="button">
                    <div slot="headline">Contact</div>
                    <md-icon slot="start">mail</md-icon>
                </md-list-item>
            </md-list>
        </nav>

        <main>
            <h1>Hello!</h1>
            <p>This layout automatically adapts: the menu expands to the <b>side</b> on computers and drops <b>downward</b> on mobile.</p>
        </main>
    </div>

    <script>
        // === Theme Toggle Logic ===
        const themeBtn = document.getElementById('theme-btn');
        const themeIcon = document.getElementById('theme-icon');
        const root = document.documentElement;

        themeBtn.addEventListener('click', () => {
            root.classList.toggle('dark');
            if (root.classList.contains('dark')) {
                themeIcon.innerText = 'light_mode';
            } else {
                themeIcon.innerText = 'dark_mode';
            }
        });

        // === Drawer Expansion Logic ===
        const menuBtn = document.getElementById('menu-btn');
        const drawer = document.getElementById('drawer');

        menuBtn.addEventListener('click', () => {
            drawer.classList.toggle('closed');
        });

        // === Live Discord Status via Lanyard WebSocket ===
        // Using WebSockets instead of REST for instantaneous "Live" updates
        const DISCORD_ID = "705981418928472153";
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        const statusMap = {
            online: 'Online',
            idle: 'Idle',
            dnd: 'Do Not Disturb',
            offline: 'Offline'
        };

        function connectLanyard() {
            const ws = new WebSocket('wss://api.lanyard.rest/socket');
            let heartbeatInterval;

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);

                if (msg.op === 1) { // Hello from server
                    // Send initialize payload
                    ws.send(JSON.stringify({
                        op: 2,
                        d: { subscribe_to_id: DISCORD_ID }
                    }));
                    // Start heartbeat
                    heartbeatInterval = setInterval(() => {
                        ws.send(JSON.stringify({ op: 3 }));
                    }, msg.d.heartbeat_interval);
                } 
                else if (msg.t === 'INIT_STATE' || msg.t === 'PRESENCE_UPDATE') {
                    // Update UI with live status
                    const status = msg.d.discord_status;
                    statusDot.className = `status-dot ${status}`;
                    statusText.innerText = statusMap[status] || 'Unknown';
                }
            };

            ws.onclose = () => {
                clearInterval(heartbeatInterval);
                statusDot.className = 'status-dot offline';
                statusText.innerText = 'Disconnected';
                // Try to reconnect after a short delay
                setTimeout(connectLanyard, 5000);
            };
        }

        // Initialize Lanyard connection
        connectLanyard();
    </script>
</body>
</html>
